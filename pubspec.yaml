name: personal_expense_tracker
description: "DailyDash - Personal Expense Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.0.0
  uuid: ^4.0.0
  connectivity_plus: ^6.0.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  image: ^4.1.7
  device_preview: ^1.2.0
  google_fonts: ^6.2.1
  pdf: ^3.11.0
  path_provider: ^2.1.2
  open_file: ^3.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#000000"
  image: assets/images/dailydash_logo_new.png
  color_dark: "#000000"
  image_dark: assets/images/dailydash_logo_new.png
  android_12:
    color: "#000000"
    image: assets/images/dailydash_logo_new.png
    color_dark: "#000000"
    image_dark: assets/images/dailydash_logo_new.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dailydash_logo_new.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/dailydash_logo_new.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
