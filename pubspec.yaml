name: personal_expense_tracker
description: "DailyDash - Personal Expense Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  fl_chart: ^0.70.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  device_preview: ^1.2.0
  google_fonts: ^6.2.1
  pdf: ^3.11.0
  path_provider: ^2.1.2
  open_file: ^3.5.6

  # Supabase hybrid (offline-first + email/password auth) backend stack
  supabase_flutter: ^2.5.6
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dailydash_logo_new.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/dailydash_logo_new.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
