<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top Navigation Shell (TopAppBar) -->
<header class="fixed top-0 w-full z-50 bg-neutral-950/40 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
<img alt="User Profile" data-alt="close-up portrait of a stylish young professional with glasses and a soft smile in minimalist digital art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAy2Ilgg3vQVjj4yLQKs0rAb-ha_9D8vW0HqoWBioKyBw-28g9Ta45Zx6VskBURB-XEqGpcFk3J8PeO3_g9qcY0fdwTW4SfwMu5sdSnQyZ9attnmOiEIsf7r1ZkpYDnzZusEzZfT2VgTUx5crLivnXWIEJc4n4n-ESicXmpa5gRwNDS3pFc-rZNCeV7MT052raQ_EesqpLzq9WMAlR-JijmbXXjvO-1wKbxXwFwfFbfeJPAoH89AAf76dik4j1ZA-AeoKyotjqdbGI"/>
</div>
<span class="text-xl font-bold bg-gradient-to-br from-purple-300 to-purple-500 bg-clip-text text-transparent font-plus-jakarta-sans tracking-tight">Lumina Ledger</span>
</div>
<button class="text-neutral-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-6 max-w-md mx-auto">
<!-- Close/Back Action (Transactional Focus) -->
<div class="flex items-center justify-between mb-8">
<h1 class="text-2xl font-bold tracking-tight">Add Expense</h1>
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Amount Input Section -->
<section class="mb-10 text-center">
<p class="text-label-sm text-on-surface-variant mb-2 uppercase tracking-[0.2em] font-medium text-[10px]">Enter Amount</p>
<div class="relative inline-flex items-baseline justify-center gap-2">
<span class="text-2xl font-bold text-primary">₹</span>
<span class="text-[4rem] font-extrabold leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-white/40 drop-shadow-[0_0_15px_rgba(219,144,255,0.4)]">
                    1,250
                </span>
<span class="w-1 h-14 bg-primary animate-pulse ml-1 rounded-full"></span>
</div>
</section>
<!-- Forms & Fields (Bento Style Cards) -->
<div class="space-y-6">
<!-- Category Grid -->
<section>
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Category</h2>
<span class="text-xs text-primary font-medium">See All</span>
</div>
<!-- Updated grid with 5 columns for mobile portrait focus, or using flex-wrap/smaller icons -->

<div class="flex flex-col items-center gap-2 py-3 px-1 rounded-lg bg-primary-container/10 border border-primary/20 neon-glow-primary">

<span class="material-symbols-outlined text-lg" data-icon="restaurant">restaurant</span>
</div>
<span class="text-[8px] font-semibold text-primary truncate w-full text-center">Food</span>
</div>
<div class="flex flex-col items-center gap-2 py-3 px-1 rounded-lg bg-surface-container-low hover:bg-surface-container transition-colors">
<div class="w-9 h-9 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400">
<span class="material-symbols-outlined text-lg" data-icon="bolt">bolt</span>
</div>
<span class="text-[8px] font-semibold text-on-surface-variant truncate w-full text-center">Bills</span>
</div>
<div class="flex flex-col items-center gap-2 py-3 px-1 rounded-lg bg-surface-container-low hover:bg-surface-container transition-colors">
<div class="w-9 h-9 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400">
<span class="material-symbols-outlined text-lg" data-icon="directions_car">directions_car</span>
</div>
<span class="text-[8px] font-semibold text-on-surface-variant truncate w-full text-center">Transport</span>
</div>
<div class="flex flex-col items-center gap-2 py-3 px-1 rounded-lg bg-surface-container-low hover:bg-surface-container transition-colors">
<div class="w-9 h-9 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400">
<span class="material-symbols-outlined text-lg" data-icon="shopping_bag">shopping_bag</span>
</div>
<span class="text-[8px] font-semibold text-on-surface-variant truncate w-full text-center">Shop</span>
</div>
<div class="flex flex-col items-center gap-2 py-3 px-1 rounded-lg bg-surface-container-low hover:bg-surface-container transition-colors">
<div class="w-9 h-9 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400">
<span class="material-symbols-outlined text-lg" data-icon="medical_services">medical_services</span>
</div>
<span class="text-[8px] font-semibold text-on-surface-variant truncate w-full text-center">Health</span>
</div>
</div>
</section>
<!-- Mode & Details -->
<section class="grid grid-cols-2 gap-4">
<div class="p-5 rounded-lg bg-surface-container-low flex flex-col gap-3">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Payment Mode</label>
<div class="flex items-center gap-2 text-secondary font-semibold">
<span class="material-symbols-outlined text-xl" data-icon="credit_card">credit_card</span>
<span class="text-sm">Credit Card</span>
</div>
</div>
<div class="p-5 rounded-lg bg-surface-container-low flex flex-col gap-3">

<span class="material-symbols-outlined text-xl text-neutral-400" data-icon="calendar_today">calendar_today</span>
<span class="text-sm">Today, 14:20</span>
</div>
</div>
</section>

<input class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-neutral-600 font-medium" placeholder="What was this for?" type="text"/>
</section>

<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">1</button>

<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">4</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">5</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">6</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">7</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">8</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">9</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">.</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">0</button>
<button class="h-16 rounded-lg bg-surface-container-highest/30 flex items-center justify-center text-xl font-bold hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</section>
</div>
</main>

<footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background via-background/95 to-transparent">
<button class="w-full h-16 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(219,144,255,0.4)] active:scale-95 transition-transform">
<span>Confirm Transaction</span>
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
</footer>
